<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Premium car silhouette — Fahrschule Antonio Marino -->
  <!-- Modern sedan, side-front 3/4 view, no background -->

  <!-- Car body shadow -->
  <ellipse cx="600" cy="440" rx="380" ry="15" fill="rgba(245, 182, 20, 0.08)" />

  <!-- Main body -->
  <path d="M 180 380
    L 200 340
    L 280 290
    L 420 255
    L 540 245
    L 680 250
    L 820 265
    L 920 290
    L 980 320
    L 1010 350
    L 1015 380
    L 990 385
    L 960 385
    A 55 55 0 0 0 845 385
    L 410 385
    A 55 55 0 0 0 295 385
    L 200 385
    Z"
    fill="url(#bodyGrad)"
    stroke="rgba(245, 182, 20, 0.3)"
    stroke-width="1.5"
  />

  <!-- Roof / Cabin -->
  <path d="M 360 280
    L 420 255
    L 540 245
    L 680 250
    L 780 265
    L 800 285
    L 760 295
    L 380 295
    Z"
    fill="url(#roofGrad)"
    opacity="0.95"
  />

  <!-- Windshield -->
  <path d="M 390 285
    L 530 252
    L 620 252
    L 615 285
    Z"
    fill="url(#glassGrad)"
    opacity="0.85"
  />

  <!-- Side windows -->
  <path d="M 635 285
    L 640 254
    L 720 256
    L 765 270
    L 755 285
    Z"
    fill="url(#glassGrad)"
    opacity="0.75"
  />

  <!-- Window divider -->
  <line x1="620" y1="252" x2="618" y2="290" stroke="rgba(0,0,0,0.4)" stroke-width="2" />

  <!-- Front wheel -->
  <circle cx="895" cy="385" r="55" fill="#0A0E17" stroke="rgba(245, 182, 20, 0.4)" stroke-width="2" />
  <circle cx="895" cy="385" r="38" fill="#1A2138" />
  <circle cx="895" cy="385" r="22" fill="#0A0E17" />
  <circle cx="895" cy="385" r="8" fill="rgba(245, 182, 20, 0.6)" />

  <!-- Front wheel spokes -->
  <g stroke="rgba(245, 182, 20, 0.15)" stroke-width="2" fill="none">
    <line x1="895" y1="355" x2="895" y2="415" />
    <line x1="865" y1="385" x2="925" y2="385" />
    <line x1="873" y1="363" x2="917" y2="407" />
    <line x1="873" y1="407" x2="917" y2="363" />
  </g>

  <!-- Rear wheel -->
  <circle cx="350" cy="385" r="55" fill="#0A0E17" stroke="rgba(245, 182, 20, 0.4)" stroke-width="2" />
  <circle cx="350" cy="385" r="38" fill="#1A2138" />
  <circle cx="350" cy="385" r="22" fill="#0A0E17" />
  <circle cx="350" cy="385" r="8" fill="rgba(245, 182, 20, 0.6)" />

  <!-- Rear wheel spokes -->
  <g stroke="rgba(245, 182, 20, 0.15)" stroke-width="2" fill="none">
    <line x1="350" y1="355" x2="350" y2="415" />
    <line x1="320" y1="385" x2="380" y2="385" />
    <line x1="328" y1="363" x2="372" y2="407" />
    <line x1="328" y1="407" x2="372" y2="363" />
  </g>

  <!-- Headlight -->
  <path d="M 980 325
    L 1010 350
    L 1005 360
    L 975 338
    Z"
    fill="rgba(245, 182, 20, 0.9)"
  >
    <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Headlight glow -->
  <ellipse cx="1020" cy="345" rx="30" ry="8" fill="rgba(245, 182, 20, 0.15)">
    <animate attributeName="fill-opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite" />
  </ellipse>

  <!-- Taillight -->
  <rect x="188" y="335" width="18" height="12" rx="3" fill="rgba(220, 38, 38, 0.8)" />

  <!-- Door line -->
  <path d="M 550 255 L 545 380" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" />
  <path d="M 690 256 L 695 380" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" />

  <!-- Door handle -->
  <rect x="580" y="315" width="25" height="4" rx="2" fill="rgba(245, 182, 20, 0.3)" />

  <!-- Side accent line -->
  <path d="M 220 355 L 970 355" stroke="rgba(245, 182, 20, 0.12)" stroke-width="1" />

  <!-- "AM" badge on side -->
  <text x="600" y="340" font-family="Sora, sans-serif" font-size="14" font-weight="800"
    fill="rgba(245, 182, 20, 0.2)" text-anchor="middle" letter-spacing="2">
    ANTONIO MARINO
  </text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2A47" />
      <stop offset="40%" stop-color="#15203A" />
      <stop offset="100%" stop-color="#0D1320" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252F4A" />
      <stop offset="100%" stop-color="#1A2138" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(96, 165, 250, 0.3)" />
      <stop offset="100%" stop-color="rgba(30, 42, 71, 0.5)" />
    </linearGradient>
  </defs>

  <!-- Reduced motion -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate { display: none; }
    }
  </style>
</svg>
