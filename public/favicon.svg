<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#0D1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#FFB627"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="12" y="12" width="76" height="76" rx="16" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <!-- Car silhouette -->
  <path d="M20 58 L24 48 L36 42 L52 40 L66 42 L76 46 L80 52 L82 58 L80 62 L76 62 A6 6 0 0 0 64 62 L36 62 A6 6 0 0 0 24 62 L20 62 Z"
