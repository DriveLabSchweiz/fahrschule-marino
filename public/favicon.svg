  <circle cx="30" cy="62" r="5" fill="#060810"/>
  <circle cx="70" cy="62" r="5" fill="#060810"/>
  <!-- Headlight beam -->
  <path d="M82 54 L90 50 L92 56 L84 58 Z" fill="#FFB627" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
